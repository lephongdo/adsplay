name: Build AdsPlay Apps
on: [push, workflow_dispatch]

jobs:
  build:
    name: Build Apps
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Cài đặt Java (Bắt buộc để build Android)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Cài đặt Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Lấy thư viện
      - name: Get Dependencies
        run: flutter pub get

      # 4. Build Android APK
      - name: Build APK
        run: flutter build apk --release

      # 5. Build Windows EXE
      - name: Build Windows
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      # 6. Đưa file lên cho bạn tải
      - name: Upload Results
        uses: actions/upload-artifact@v3
        with:
          name: AdsPlay-Release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/runner/Release/
