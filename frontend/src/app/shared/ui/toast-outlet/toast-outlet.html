<div class="fixed top-4 right-4 z-[120] flex w-[min(24rem,calc(100vw-2rem))] flex-col gap-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
  <div
    class="pointer-events-auto rounded-2xl border px-4 py-3 shadow-xl backdrop-blur-xl animate-scale-up"
    [class.bg-emerald-50]="toast.tone === 'success'"
    [class.border-emerald-200]="toast.tone === 'success'"
    [class.text-emerald-700]="toast.tone === 'success'"
    [class.bg-red-50]="toast.tone === 'error'"
    [class.border-red-200]="toast.tone === 'error'"
    [class.text-red-700]="toast.tone === 'error'"
    [class.bg-white]="toast.tone === 'info'"
    [class.border-slate-200]="toast.tone === 'info'"
    [class.text-slate-700]="toast.tone === 'info'">
    <div class="flex items-start gap-3">
      <div
        class="mt-0.5 h-2.5 w-2.5 rounded-full"
        [class.bg-emerald-500]="toast.tone === 'success'"
        [class.bg-red-500]="toast.tone === 'error'"
        [class.bg-brand-primary]="toast.tone === 'info'"></div>
      <div class="flex-1 text-sm font-medium leading-relaxed">
        {{ toast.message }}
      </div>
      <button
        type="button"
        (click)="toastService.dismiss(toast.id)"
        class="rounded-lg p-1 text-current/50 transition-colors hover:bg-black/5 hover:text-current"
        aria-label="Dismiss notification">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
  }
</div>
