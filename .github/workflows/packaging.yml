name: Build Old AdsPlay
on: [push, workflow_dispatch]

jobs:
  build:
    name: Build Process
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # Dùng Java 11 cho các dự án cũ ổn định hơn

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' # ĐÂY LÀ PHIÊN BẢN GỐC CỦA ADSPLAY
          channel: 'stable'

      - name: Fix Dependencies
        run: |
          # Lệnh này cực kỳ quan trọng để dọn dẹp các thư viện rác
          flutter pub cache repair 
          flutter pub get --no-example

      - name: Build Android
        # Thêm flag --no-sound-null-safety vì code này chưa nâng cấp bảo mật Dart mới
        run: flutter build apk --release --no-sound-null-safety

      - name: Build Windows
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release --no-sound-null-safety

      - name: Save Results
        uses: actions/upload-artifact@v4
        with:
          name: App-Ready-To-Use
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/runner/Release/
