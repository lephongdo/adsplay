name: Mobile and Desktop Packaging
on: [push, workflow_dispatch]

jobs:
  build:
    name: Build Process
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android
        run: flutter build apk --release

      - name: Build Windows
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Save Results
        uses: actions/upload-artifact@v4 # Đảm bảo đúng v4 ở đây
        with:
          name: App-Files-Ready
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/runner/Release/
